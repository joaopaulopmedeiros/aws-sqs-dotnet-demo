services:
  loki:
    image: grafana/loki:3.4.1
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    volumes:
      - ./.otel/loki.yml:/etc/loki/loki.yml

  tempo:
    image: grafana/tempo:2.7.2
    command: -config.file=/etc/tempo.yml
    ports:
      - "3200:3200"
    volumes:
      - ./.otel/tempo.yml:/etc/tempo.yml

  prometheus:
    image: prom/prometheus:v3.3.0
    ports:
      - "9090:9090"
    volumes:
      - ./.otel/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./.otel/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - loki
      - tempo

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./.otel/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
      - prometheus
      - tempo

  localstack:
    image: localstack/localstack:4
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs
      - AWS_DEFAULT_REGION=us-east-1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
    volumes:
      - "./.localstack/init:/etc/localstack/init/ready.d"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - AWS__ServiceURL=http://localstack:4566
      - AWS__Region=us-east-1
      - Messaging__QueueUrl=http://localstack:4566/000000000000/orders
      - Logging__LogLevel__Default=Warning
      - Logging__LogLevel__Microsoft.AspNetCore=Warning
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
    depends_on:
      localstack:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: src/Order.Worker/Dockerfile
    environment:
      - DOTNET_ENVIRONMENT=Development
      - AWS__ServiceURL=http://localstack:4566
      - AWS__Region=us-east-1
      - Messaging__QueueUrl=http://localstack:4566/000000000000/orders
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
    depends_on:
      localstack:
        condition: service_healthy
      otel-collector:
        condition: service_started

  k6:
    image: grafana/k6:latest
    volumes:
      - "./tests/Order.WebApi.LoadTests:/scripts"
    environment:
      - BASE_URL=http://api:8080
    depends_on:
      api:
        condition: service_started
    command: run /scripts/create-order.js
    profiles:
      - load
